<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Карточка товара — Тёплые Петли</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">Тёплые Петли</a>

      <button class="burger" type="button" aria-label="Открыть меню" aria-expanded="false">
        <span class="burger__line"></span>
      </button>

      <nav class="nav">
        <a class="nav__link" href="index.html">Главная</a>
        <a class="nav__link" href="catalog.html">Каталог</a>
        <a class="nav__link" href="cart.html">Корзина</a>
        <a class="nav__link" href="contacts.html">Контакты</a>
        <a class="nav__link" href="checkout.html">Оформление заказа</a>
      </nav>

      <div class="header__actions">
        <a href="cart.html" class="header__cart-btn">
          <span class="header__cart-label">Корзина</span>
          <span class="cart-badge" id="cart-count">0</span>
        </a>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <div class="product-page" id="product-page"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2026 Тёплые Петли — вязаные изделия ручной работы</p>
    </div>
  </footer>

  <script src="js/products.js"></script>
  <script src="js/main.js"></script>

</html>
