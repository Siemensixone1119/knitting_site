<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Оформление заказа — Тёплые Петли</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">Тёплые Петли</a>

      <button class="burger" type="button" aria-label="Открыть меню" aria-expanded="false">
        <span class="burger__line"></span>
      </button>

      <nav class="nav">
        <a class="nav__link" href="index.html">Главная</a>
        <a class="nav__link" href="catalog.html">Каталог</a>
        <a class="nav__link" href="cart.html">Корзина</a>
        <a class="nav__link" href="contacts.html">Контакты</a>
        <a class="nav__link nav__link--active" href="checkout.html">Оформление заказа</a>
      </nav>

      <div class="header__actions">
        <a href="cart.html" class="header__cart-btn">
          <span class="header__cart-label">Корзина</span>
          <span class="cart-badge" id="cart-count">0</span>
        </a>
      </div>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container checkout-page">
        <div class="checkout-card">
          <h1 class="section__title">Оформление заказа</h1>
          <p class="section__text">
            Заполните данные, чтобы оформить заказ на выбранные изделия.
          </p>

          <form class="form" id="checkout-form">
            <label class="form__group">
              <span class="form__label">ФИО</span>
              <input class="form__input" type="text" required>
            </label>

            <label class="form__group">
              <span class="form__label">Телефон</span>
              <input class="form__input" type="tel" required>
            </label>

            <label class="form__group">
              <span class="form__label">Адрес доставки</span>
              <input class="form__input" type="text" required>
            </label>

            <label class="form__group">
              <span class="form__label">Комментарий к заказу</span>
              <textarea class="form__textarea"></textarea>
            </label>

            <button class="button" type="submit">Подтвердить заказ</button>
            <p class="form__success" id="checkout-success"></p>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2026 Тёплые Петли — вязаные изделия ручной работы</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
